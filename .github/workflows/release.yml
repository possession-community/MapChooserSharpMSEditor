name: Release

on:
  push:
    tags:
      - 'v*'
      - 'pre-*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained exe
        run: >
          dotnet publish src/MapChooserSharpMSEditor/MapChooserSharpMSEditor.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Rename exe with version
        run: |
          Copy-Item `
            src/MapChooserSharpMSEditor/bin/Release/net10.0/win-x64/publish/MapChooserSharpMSEditor.exe `
            MapChooserSharpMSEditor-${{ github.ref_name }}.exe

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $flags = if ("${{ github.ref_name }}".StartsWith("pre-")) { "--prerelease" } else { "" }
          gh release create ${{ github.ref_name }} MapChooserSharpMSEditor-${{ github.ref_name }}.exe --generate-notes $flags
