name: Release

on:
  push:
    tags:
      - 'v*'
      - 'pre-*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained exe
        run: >
          dotnet publish src/MapChooserSharpMSEditor/MapChooserSharpMSEditor.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Zip release
        run: |
          Compress-Archive `
            -Path src/MapChooserSharpMSEditor/bin/Release/net10.0/win-x64/publish/MapChooserSharpMSEditor.exe `
            -DestinationPath MapChooserSharpMSEditor-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, 'pre-') }}
          files: MapChooserSharpMSEditor-${{ github.ref_name }}-win-x64.zip
